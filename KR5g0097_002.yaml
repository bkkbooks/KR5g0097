front:
  text: 元辰章醮立成曆卷下階三
  hash: sha256:709dc7f2f78a309ab0c784e8515380480230421ebe77f9f2ff85d5656e227e4f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0097_HFL_002-001a, image: hfl/1008/1008-070.png}
body:
  text: 消本命元辰胎生行年元辰等災曰某本命行年及胎生兩月年命二元辰上所被見諸厄魁綱天殺或自相為惡或自相刑害並各請其子神和釋分解合神保護令得無他次推解法干曆甲乙丙丁戊巳庚辛壬癸惡神庚辛壬癸甲乙丙丁戊已子神丙丁戊巳庚辛壬癸甲乙合神戊巳庚辛壬癸甲乙丙丁右件隂陽干各將配下十二支也支曆子丑寅卯辰巳午未申酉戌亥惡神辰戌卯申酉寅亥子卯午巳寅丑未子神寅酉午巳申丑未辰戌酉子亥申卯合神丑子亥戌酉申未午巳辰卯寅右件隂陽支配前十干為六甲知其為惡取其子合假令本命甲子則惡在庚辰成請子神丙寅某乙合神巳丑某乙第一甲本命某惡在某謹請子神某乙從官若干人為某和釋自相為惡之災消却本命上所見諸厄魁綱天殺衆災惡害一切解除之為某土含元氣度養性命又請合神某乙從官若干人為某保護本命令得無他第二某乙元辰某惡在某謹請子神某從官若干人為某和釋自相為惡云云具如本命例也其中有别啓當依文具之消却元辰上云云為某含玉香吐玉漿保養元精延度臨終之命又請合神云云為某保護元辰令得無他第三胎月悉如例消却胎月上吐含和氣保養胎元又請合神云云第四生月並如上却生月上吐含和氣保養生元又請合神云云第五行年悉如前却行年上吐含元氣保度懸命又請合神云云第六行年元辰云云如上却年元辰上吐雄黃含玉香保度行年元精延度臨危之厄難又請合神云云保護行年元辰某令得無他右消年命胎生元辰大略如此其中巧妙事由多能次還神願請某本命神某乙如干元辰神云云胎月神云云生月神云云行年神云云行年神辰神云云各還某身中為鎮神捍體依附宫室除凶去害怡神赤子無令越逸若居病云又請今歲神某假令甲子歲即云甲子王文卿從官十八人隨歲次神請駕某乘某歲在寅卯辰駕青龍乘白虎歲在申酉戌駕白虎乘青龍歲在巳午未駕朱雀乘玄武歲在亥子丑駕玄武乘朱雀手持針藥口含雄黃吐玉香亦云銜玉香吐玉漿一合下到某之家詣某身中療治所苦百疾病從頭至足從左至右周身繞體經緯百脉調和五內豁然除差保却今年之中亦云迄于來歲消却凶邪惡毒災禍鬼疰一切並令消解扶衰度厄皆使無他次某本命某死氣某從本命神順計得八神為死氣願請生氣救神某自命神逆計得八神為生氣從官如干人為某奉齎章上法信上詣某天帝某宫取本命所屬二十八宿中天帝及宫名列星度宿分解災厄上詣某府某君還取所屬天帝之府君名勒不死氣之鄉甲乙少陽丙丁太陽庚辛少隂壬癸太隂戊巳中央某宫亥子北宫寅卯東宫巳午南宫申酉西官辰戌丑未中官皆取本命支干也為某貿名易形削除死氣某順八神也移名生録之中延命無窮假令甲子生人死氣辛未是生氣救神丁巳崔巨卿從官十人是上詣元明天帝上元宫列星度宿分解災厄上詣無生府齊童君勒不死氣之鄉下勒少陽北宫為某貿名易形削除死氣辛未移居生録之中延命無窮舉此一例餘足知之次推六甲神名及從官數甲已子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五巳亥四右以此支干相配即成從官數甲子王丈卿從官十八人乙丑龍委卿從官十六人丙寅張仲卿從官十四人丁卯司馬卿從官十二人戊辰季楚卿從官十人巳巳何文昌從官十三人庚午馮仲卿從官十七人辛未王文章從官十五人壬申侯博卿從官十三人癸酉孫仲房從官十一人甲戌展子江從官十四人乙亥龎明公從官十二人丙子邢孫卿從官十六人丁丑趙子玉從官十四人戊寅虞子卿從官十二人已卯石丈陽從官十五人庚辰尹佳卿從官十三人辛巳陽仲公從官十一人壬午馬子明從官十五人癸未吕威明從官十三人甲申扈丈長從官十六人乙酉孔利公從官十四人丙成車元升從官十二人丁亥張丈通從官十人戊子樂石陽從官十四人已丑范和卿從官十七人庚寅楮進卿從官十五人辛卯郭子良從官十三人壬辰武稚卿從官十一人癸已史公來從官九人甲午衛上卿從官十八人乙人杜仲陽從官十六人丙申朱伯衆從官十四人丁酉藏文公從官十二人戊戌范少卿從官十人巳亥鄧都卿從官十三人庚子陽仲叔從官十七人辛丑林衛公從官十五人壬寅丘孟卿從官十三人癸卯蘇他家從官十一人甲辰孟非卿從官十四人乙巳唐丈卿從官十二人丙午魏文公從官十六人丁未石叔通從官十四人戊申范伯陽從官十二人已酉成文長從官十五人庚戌史子仁從官十三人辛亥左子行從官十一人壬子宿上卿從官十五人癸丑江漢卿從官十三人甲寅明文章從官十六人乙卯戴公陽從官十四人丙辰霍叔英從官十二人丁已崔巨卿從官十人戊午從元光從官十四人已未時通卿從官十七人庚申華文陽從官十五人辛酉邴元玉從官十三人壬戌樂進卿從官十一人癸亥左石松從官九人右六甲六旬神名從官人數如前各從本命行年胎月生月本命元辰等支干配取所惡之神及子神和釋合神保護依名請之也次消五音災某姓音屬角惡在西方金謹請南方丙丁八蠻君六十四官為某解角姓之宫却除西宫定禍願請南方熒惑星君火德來生東宫角姓之音禳災致福收除太白星白氣之害某姓音屬徴惡在北方水謹請中央戊已三秦君千二百官為某解徴姓之宫却除北宫定禍願請中央鎮星君土德來生南宫徴姓之音禳災致福收除辰星黑氣之害某姓音屬宫惡在東方木謹請西方庚辛六戎君三十六官為某解宫姓之宫却除東宫定禍願請西方太白星君金德來生中宫宫姓之音禳災致福收除歲星青氣之害某姓音屬商惡在南方火謹請北方壬癸五狄君二十五官為某解商姓之宫却除南宫定禍願請北方辰星君水德來生西宫商姓之音禳災致福收除熒惑星赤氣之害某姓音屬羽惡在中央土謹請東方甲乙九夷君八十一官為某解羽姓之宫却除中宫定禍願請東方歲星君木德來生北宫羽姓之音禳災致福收除鎮星黃氣之害次消五鬼絶命災法坎鬼吏在兊絶命在坤願請巽神字明一四部將軍將吏各四千人兵士各四萬人為某延度厄難離鬼吏在艮絶命在乾願請震神字玄舉三部將軍將吏各三千人兵士各三萬人為某延度厄難震鬼吏在坤絶命在兊願請離神字明上九部將軍將吏各九千人兵士各九萬人為某延度厄難坤鬼吏在震絶命在坎願請艮神字過薏八部將軍將吏各八千人兵士各八萬人為某延度厄難巽鬼吏在乾絶命在艮願請坎神字仁王一部將軍將吏各一千人兵士各一萬人為某延度厄難兊鬼吏在坎絶命在震願請乾神字昊成六部將軍將吏各六千人兵士各六萬人為某延度厄難艮鬼吏在離絶命在巽願請坤神字暗沖二部將軍將吏各二千人兵士各二萬人為某延度厄難乾鬼吏在巽絶命在離願請兊神字見陽十部將軍將吏各七千人兵士各七萬人為某延度厄難消災却禍安心定志散除衆惡解釋絶命五鬼所忌之宫使相順伏消滅鬼氣次入章次慰喻五藏依四時五行言之今春木玉肝藏受氣生氣循環噓吸紫府性命泉流潮液所繫願紫微宫使者溫和凝淳源本上出兩眼下回手脅閉密中房隨節應㑹功成道泰傳以付心脾肺腎肝以次相連今夏火王心藏受氣生氣循環噓吸炎府性命泉流潮液所繫願絳宫使者溫和凝淳源本上出脣口下回心中閉密中房隨節應㑹功成道泰傳以付脾肺腎肝心以次相連今秋金王肺藏受氣生氣循環噓吸素府性命泉流潮液所繫願華蓋官使者溫和凝淳源本上出頰頥下回肺中閉密中房隨節應㑹功成道泰傳以付腎肝心脾肺以次相連今冬水王腎藏受氣生氣循環噓吸玄府性命泉流潮液所繫願雙合官使者溫和凝淳源本上出兩耳下回玉海閉密中房隨節應㑹功成道泰傳以付肝心脾肺腎以次相連今春夏秋冬季土王脾藏受氣生氣循環噓吸土府性命泉流潮液所繫願玉堂宫使者溫和凝淳源本上出口下回脾中閉密中房隨節應㑹功成道泰傳以付季春付心脾肺腎肝以次相連季夏付肺腎肝心脾以次相連季秋付腎肝心脾肺以次相連季冬付肝心脾肺腎以次相連又法季秋季冬用溫和凝淳春季夏季不須溫和二字也次課四時請春請四部啓明君夏請太微玉華君秋請少昊金樓玉門君冬請大𡨋幽窈君今歲直神某從官如干人今月直神某從官如干人今日直神某從官如干人今時直神某從官如干人歲直太歲神是今月直神甲已之歲正月建丙寅二月丁卯以次盡十二月推之他皆效此乙庚之歲正月建戊寅二月已卯丙辛之歲正月建庚寅丁壬之歲正月建壬寅戊癸之歲正月建甲寅依此推之即知月中六甲也今日直神即上章日神也今時直神還用甲巳推之也甲巳之日平旦起丙寅乙庚之日平旦起戊寅丙辛之日平旦起庚寅丁壬之日平旦起壬寅戊癸之日平旦起甲寅以此推之即知時中六甲也次依四時送章付與玉童玉女春付與青圭玉童青腰玉女夏付與赤璧玉童赤圭玉女秋付與素圭玉童素圭玉女冬付與玄素太晨玉童玄機玉女必使上達伏受玄恩次上詣太上某宫伏須告報一日建玉曹赤虛宫二日太素曹太微宫三日太微曹北平宫四日都正曹太清宫五日正一曹通明宫六日玄一曹上明宫七日太素曹髙靈宫八日靈集曹紫微宫九日丹靈曹待春宫十日太清曹武靈宫十一日三水曹素女宫十二日司録曹巨野宫十三日清叙曹西明宫十四日玄正曹上絳宫十五日中都曹曲平宫十六日司非曹北府宫十七日司姦曹南真宫十八日統攝曹東明宫十九日統録曹西靈宫二十日監考曹司命宫二十一日監司曹陽明宫二十二日典考曹太陽宫二十三日司宫曹少陽宫二十四日玄天曹太隂宫二十五日太玄曹少隂宫二十六日都司曹北辰宫二十七日都候曹太白宫二十八日直使曹林明宫二十九日司直曹諸陽宫三十日典考曹啓明宫右一月之中三十日宫曹上章日依此用之又章頭若詣月宫者故録之卷後正月太上虛無丈人宫二月太上玄老仙都宫三月四月太上三天太清宫五月太上道靈宫一云重道宫六月七月太上九氣文昌宫八月太上天帝宫九月十月太上大道宫十一月太上侍中左右監神諸將軍宫十二月太上虛無丈人宫與正月同閏月太上余單太歲宫元辰章醮立成曆卷下
